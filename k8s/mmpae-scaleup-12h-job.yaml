apiVersion: batch/v1
kind: Job
metadata:
  name: mmpae-scaleup-12h
  namespace: __NAMESPACE__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        private-h200-aipr-0-pod-default: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: main
          image: __IMAGE__
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
              cd /workspace
              /opt/conda/envs/main/bin/python smoke_test.py --device cuda
              /opt/conda/envs/main/bin/python train_HMMPAE.py \
                --data_path /data/polyone_tokenized \
                --predictor_checkpoint /data/ckpt/PolyBert_Regressor.pt \
                --tokenizer_path /data/polyBERT \
                --prefix /data/runs \
                --config_path configs/Inverse_CwA_0p35B.yaml \
                --loss_type CwA \
                --temperature 0.2 \
                --beta 1000 \
                --alpha 100 \
                --epochs 90 \
                --batch_size 128 \
                --eval_batch_size 512 \
                --steps 1024 \
                --interval 30 \
                --final_eval_only True \
                --dec_layers 12 \
                --exp_name mmpae-0p35B-e90
          resources:
            requests:
              cpu: "16"
              memory: "128Gi"
            limits:
              cpu: "16"
              memory: "128Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: __PVC_NAME__
